name: concert_visuals

hierarchy_weights:
  macro: 1.5
  meso:  1.2
  micro: 0.8

tracks:
  - name: downbeat_pulse
    type: impulse
    source: beats
    filter: "is_downbeat == true"
    score:
      base: 1.0
      multiplier:
        - {when: "section_label == 'chorus'", factor: 1.3}
        - {when: "section_label == 'drop'",   factor: 1.5}
    envelope: {a: 0.02, d: 0.20, s: 0.0, r: 0.0}

  - name: phrase_pulse
    type: impulse
    source: beats
    filter: "is_phrase_start()"
    score:
      base: 1.0
      multiplier:
        - {when: "section_label == 'chorus'", factor: 1.5}
    envelope: {a: 0.03, d: 0.30, s: 0.0, r: 0.0}

  - name: fill_flash
    type: impulse
    source: beats
    filter: "is_fill()"
    score:
      base: 1.0
    envelope: {a: 0.01, d: 0.25, s: 0.0, r: 0.0}

  - name: kick
    type: impulse
    source: onsets.drums
    filter: "drum_class == 'kick'"
    score:
      base: "strength"
      multiplier:
        - {when: "near_downbeat(0.05)", factor: 1.2}
    rarity:
      window_sec: 1.0
      decay: 4.0
    envelope: {a: 0.005, d: 0.12, s: 0.0, r: 0.0}

  - name: snare
    type: impulse
    source: onsets.drums
    filter: "drum_class == 'snare'"
    score:
      base: "strength"
    rarity:
      window_sec: 0.5
      decay: 3.0
    envelope: {a: 0.005, d: 0.15, s: 0.0, r: 0.0}

  - name: drop
    type: impulse
    source: "onsets.*"
    filter: "any_label('sub bass drop', min_score=0.6)"
    score:
      base: "label_score('sub bass drop')"
    envelope: {a: 0.05, d: 0.4, s: 0.6, r: 1.5}
    cooldown_sec: 8.0

  - name: vocal_phrase
    type: envelope
    source: phrases.vocals
    score:
      base: "max(energy_curve)"
    envelope: {a: 0.30, d: 0.20, s: 0.7, r: 0.50}
    shape_curve_from: "energy_curve"

  - name: section_change
    type: step
    source: sections
    emit: section_boundary

  - name: section_ramp
    type: ramp
    source: section_transitions
    filter: "ramp_evidence.spectral_flux_rise > 0.4"

  - name: energy
    type: continuous
    source: curves.lufs
    smoothing: {kind: ema, tau_sec: 0.25}
    normalize: {kind: percentile, low: 5, high: 95}
