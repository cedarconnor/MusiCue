name: lighting

hierarchy_weights:
  macro: 1.0
  meso:  1.0
  micro: 1.3

tracks:
  - name: kick
    type: impulse
    source: onsets.drums
    filter: "drum_class == 'kick'"
    score:
      base: "strength"
    envelope: {a: 0.002, d: 0.10, s: 0.0, r: 0.0}

  - name: snare
    type: impulse
    source: onsets.drums
    filter: "drum_class == 'snare'"
    score:
      base: "strength"
    envelope: {a: 0.002, d: 0.12, s: 0.0, r: 0.0}

  - name: hihat
    type: impulse
    source: onsets.drums
    filter: "drum_class == 'hat'"
    score:
      base: "strength"
    rarity:
      window_sec: 0.2
      decay: 2.0
    envelope: {a: 0.001, d: 0.06, s: 0.0, r: 0.0}

  - name: downbeat
    type: impulse
    source: beats
    filter: "is_downbeat == true"
    score:
      base: 1.2
    envelope: {a: 0.01, d: 0.25, s: 0.0, r: 0.0}

  - name: build
    type: impulse
    source: "onsets.*"
    filter: "any_label('build up', min_score=0.55)"
    score:
      base: "label_score('build up')"
    envelope: {a: 0.1, d: 0.5, s: 0.7, r: 2.0}
    cooldown_sec: 16.0

  - name: section_brightness
    type: step
    source: sections
    emit: section_boundary

  - name: section_ramp
    type: ramp
    source: section_transitions

  - name: intensity
    type: continuous
    source: curves.lufs
    smoothing: {kind: ema, tau_sec: 0.1}
    normalize: {kind: percentile, low: 5, high: 95}
